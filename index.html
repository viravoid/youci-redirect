<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有词可栖 · 跳转中…</title>
<style>
  body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #fff4e6; color: #4a2f4e; }
  .box { text-align: center; }
  .title { font-size: 2rem; margin-bottom: 0.5rem; }
  .sub { font-size: 0.9rem; opacity: 0.7; }
</style>
<script>
(async function(){
  try {
    const resp = await fetch('url.txt?t=' + Date.now());
    const url = (await resp.text()).trim();
    if (url) window.location.replace(url);
  } catch(e) {}
})();
</script>
</head>
<body>
<div class="box">
  <div class="title">有词可栖</div>
  <div class="sub">正在进入…</div>
</div>
</body>
</html>
